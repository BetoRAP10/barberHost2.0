# Reglas de Nginx para equipo_04 — BarberHost
# Copia este archivo a ~/nginx.conf en el servidor (se aplica automáticamente).

# Panel admin: siempre por Next.js (middleware + auth en servidor)
location ^~ /equipo_04/admin {
    proxy_pass http://localhost:3028;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Cookie $http_cookie;
}

# Frontend público (sin /admin)
location /equipo_04/ {
    alias /home/equipo_04/public/;
    try_files $uri $uri/ /equipo_04/index.html;
}

# API backend
location /equipo_04/api/ {
    rewrite ^/equipo_04/api/(.*) /$1 break;
    proxy_pass http://localhost:3028;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Cookie $http_cookie;
}
